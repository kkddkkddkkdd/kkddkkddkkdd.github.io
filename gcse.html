<script>
function toggleMenu() {
    const menu = document.querySelector('.nav-links');
    const burger = document.querySelector('.hamburger');

    menu.classList.toggle('open');
    burger.classList.toggle('open');

    // Change icon
    if (burger.classList.contains('open')) {
        burger.textContent = "✖";
    } else {
        burger.textContent = "☰";
    }
}
</script>
